name: Daily scrape

on:
  schedule:
    # 10:00 UTC = 5:00 AM Central (CST winter) / 5:00 AM CDT in summer.
    # Cron is in UTC; we just live with the 1-hour drift across DST.
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scrape.py

      - name: Commit and push results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add raw_items.json items.csv web/data/items.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Daily scrape $(date -u +'%Y-%m-%d')"
            git push
          fi