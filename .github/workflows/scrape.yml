name: Daily scrape

on:
  schedule:
    # Every 2 hours on the hour (UTC). Bids on Equip-Bid climb during the
    # day, so we re-scrape often; enrichment is per-item cached so this
    # only burns Gemini quota on genuinely new lots.
    - cron: '23 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scrape.py

      - name: Commit and push results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add raw_items.json items.csv web/data/items.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Daily scrape $(date -u +'%Y-%m-%d')"
            git push
          fi
